# XcodeGen spec — generates Doppel.xcodeproj deterministically.
# Why: a hand-written .pbxproj is fragile and merge-hostile; generating it keeps the repo clean
# and lets Claude Code modify project structure by editing this YAML, not binary plist guts.
#
# Usage:
#   brew install xcodegen
#   xcodegen generate
#   open Doppel.xcodeproj

name: Doppel
options:
  bundleIdPrefix: com.doppel
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    PRODUCT_NAME: Doppel
    PRODUCT_BUNDLE_IDENTIFIER: com.doppel.app
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
  # Entitlements differ per config so the ONLY network egress (Sparkle update check, golden rule 1 /
  # RELEASE.md §5) exists solely in signed Release builds. Debug/default stays network-free, which keeps
  # the T8.4 egress guard's default-entitlements assertion honest.
  configs:
    Debug:
      CODE_SIGN_ENTITLEMENTS: App/Doppel/Resources/Doppel.entitlements
    Release:
      CODE_SIGN_ENTITLEMENTS: App/Doppel/Resources/Doppel.release.entitlements

packages:
  DoppelKit:
    path: Packages/DoppelKit
  IndexStore:
    path: Packages/IndexStore
  DetectionEngine:
    path: Packages/DetectionEngine
  DoppelCore:
    path: Packages/DoppelCore
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.5.0"

targets:
  Doppel:
    type: application
    platform: macOS
    sources:
      - path: App/Doppel
    dependencies:
      - package: DoppelKit
      - package: IndexStore
      - package: DetectionEngine
      - package: DoppelCore
      - package: Sparkle
    # Explicit Info.plist (generated by xcodegen, gitignored like the xcodeproj) because Xcode's
    # INFOPLIST_KEY_* only honors an allowlist — Sparkle's custom keys need a real plist. SUFeedURL +
    # SUPublicEDKey are PLACEHOLDERS: the maintainer sets the real feed URL and pastes the EdDSA public
    # key from `generate_keys` before the first release (RELEASE.md §5). SUEnableInstallerLauncherService
    # is required for a sandboxed app.
    info:
      path: App/Doppel/Resources/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSApplicationCategoryType: public.app-category.utilities
        NSHumanReadableCopyright: ""
        SUFeedURL: https://REPLACE-ME.example.com/appcast.xml
        SUPublicEDKey: REPLACE_WITH_EDDSA_PUBLIC_KEY
        SUEnableInstallerLauncherService: true

  DoppelUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: App/DoppelUITests
    dependencies:
      - target: Doppel
