# SwiftLint config. Run: swiftlint --strict
disabled_rules:
  - todo            # TASKS.md uses TODO markers intentionally
opt_in_rules:
  - empty_count
  - closure_spacing
  - explicit_init
  - first_where
  - sorted_imports
excluded:
  - .build
  - "**/.build"
  - DerivedData
line_length:
  warning: 140
  error: 200
type_body_length:
  warning: 400
file_length:
  warning: 600
identifier_name:
  min_length: 1   # allow short generics/indices like a, b, i
custom_rules:
  no_permanent_delete:
    name: "No permanent file deletion"
    regex: '\b(removeItem|unlink)\s*\('
    message: "Never permanently delete user files — use trashItem/recycle (SECURITY.md, CLAUDE.md golden rule 2)."
    severity: error
    # Test targets may delete their own temp fixtures; the safety guarantee covers app + engine code.
    excluded:
      - ".*Tests/.*"
      - "Tools/.*"
