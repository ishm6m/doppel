name: CI

# The real test/lint gate. Local dev only has CommandLine Tools (no XCTest, no
# lint binaries), so this is where `swift test` + lint actually run.
on:
  push:
  pull_request:

jobs:
  gate:
    # Self-hosted runner on the maintainer's Apple Silicon Mac (registered as a launchd service).
    # GitHub-hosted macOS minutes bill at 10x and had exhausted the private-repo allowance, blocking
    # all runs; self-hosting removes that dependency and runs where the gate already passes green.
    # The machine's xcode-select already points at full Xcode, so swift test/XCTest resolve natively.
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - name: Build & test packages
        run: |
          set -e
          for pkg in DoppelKit IndexStore DetectionEngine DoppelCore; do
            echo "::group::$pkg"
            swift build --package-path "Packages/$pkg"
            swift test  --package-path "Packages/$pkg"
            echo "::endgroup::"
          done

      - name: Lint
        # Pinned to the exact versions from the first green run (SHA f828b182) so a tool
        # bump can't redden the gate. Brew always grabs latest, so we fetch release binaries.
        run: |
          set -e
          BIN="$RUNNER_TEMP/bin"; mkdir -p "$BIN"
          curl -fsSL https://github.com/nicklockwood/SwiftFormat/releases/download/0.61.1/swiftformat.zip -o sf.zip
          curl -fsSL https://github.com/realm/SwiftLint/releases/download/0.64.1/portable_swiftlint.zip -o sl.zip
          unzip -joq sf.zip swiftformat -d "$BIN"
          unzip -joq sl.zip swiftlint -d "$BIN"
          chmod +x "$BIN"/*
          export PATH="$BIN:$PATH"
          swiftformat --version
          swiftlint version
          swiftformat --lint .
          swiftlint --strict

      - name: Forbid irreversible deletion
        # Golden rule 2: app code never unlinks user files — deletion goes through the Trash only
        # (FileManager.trashItem / NSWorkspace.recycle). Tests may clean up their own fixtures.
        run: |
          if grep -rnE '\.removeItem|unlink\(' --include='*.swift' Packages/*/Sources App; then
            echo "::error::Use Trash (trashItem/recycle), never removeItem/unlink on user files"
            exit 1
          fi

      - name: Forbid network egress
        # Golden rule 1 / T8.4 / SECURITY.md §3: nothing in the engine, store, or app opens a network
        # connection — no file-derived data can leave. The ONLY permitted egress is the Sparkle update
        # check, which is added in a separate documented build config when it lands; until then there is
        # zero networking code, which this proves statically (stronger than one runtime "no connection").
        # When Sparkle is integrated, scope it to its own file and add it to the exclusion below.
        run: |
          if grep -rnE 'URLSession|URLRequest|URLConnection|NWConnection|NWListener|NWPathMonitor|NWBrowser|CFSocket|CFStream|import Network|getaddrinfo|[^a-zA-Z]socket\(|\.dataTask|\.downloadTask|\.uploadTask' --include='*.swift' Packages/*/Sources App; then
            echo "::error::No networking allowed (privacy is the product). Only Sparkle may connect, in its own scoped build config."
            exit 1
          fi
          # No network entitlement in the app sandbox (SECURITY.md §3).
          if grep -nE 'com\.apple\.security\.network\.(client|server)' App/Doppel/Resources/Doppel.entitlements; then
            echo "::error::App must not request the network entitlement"
            exit 1
          fi
