name: CI

# The real test/lint gate. Local dev only has CommandLine Tools (no XCTest, no
# lint binaries), so this is where `swift test` + lint actually run.
on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build & test packages
        run: |
          set -e
          for pkg in DoppelKit IndexStore DetectionEngine DoppelCore; do
            echo "::group::$pkg"
            swift build --package-path "Packages/$pkg"
            swift test  --package-path "Packages/$pkg"
            echo "::endgroup::"
          done

      - name: Lint
        # Pinned to the exact versions from the first green run (SHA f828b182) so a tool
        # bump can't redden the gate. Brew always grabs latest, so we fetch release binaries.
        run: |
          set -e
          BIN="$RUNNER_TEMP/bin"; mkdir -p "$BIN"
          curl -fsSL https://github.com/nicklockwood/SwiftFormat/releases/download/0.61.1/swiftformat.zip -o sf.zip
          curl -fsSL https://github.com/realm/SwiftLint/releases/download/0.64.1/portable_swiftlint.zip -o sl.zip
          unzip -joq sf.zip swiftformat -d "$BIN"
          unzip -joq sl.zip swiftlint -d "$BIN"
          chmod +x "$BIN"/*
          export PATH="$BIN:$PATH"
          swiftformat --version
          swiftlint version
          swiftformat --lint .
          swiftlint --strict
